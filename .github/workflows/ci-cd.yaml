name: ci-cd

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: arvan-interview

jobs:

# =========================
# 1. DETERMINE INSTANCE
# =========================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      instance: ${{ steps.set.outputs.instance }}
      image_tag: ${{ steps.set.outputs.image_tag }}
      sha: ${{ steps.set.outputs.sha }}

    steps:
      - name: Compute instance + tag
        id: set
        run: |
          SHA=${GITHUB_SHA::7}

          REF="${GITHUB_REF}"

          if [[ "$REF" == refs/tags/* ]]; then
            TAG_NAME="${REF#refs/tags/}"

            if [[ "$TAG_NAME" =~ staging ]]; then
              INSTANCE="stage"
              IMAGE_TAG="stage-${SHA}"
            elif [[ "$TAG_NAME" =~ prd ]]; then
              INSTANCE="prd"
              IMAGE_TAG="prd-${SHA}"
            else
              echo "Invalid tag format. Must contain staging or prd"
              exit 1
            fi
          else
            # branch push → ALWAYS stage
            INSTANCE="stage"
            IMAGE_TAG="stage-${SHA}"
          fi

          echo "instance=$INSTANCE" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

# =========================
# 2. BUILD + PUSH IMAGE
# =========================
  build:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.image_tag }}

# =========================
# 3. DEPLOY
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - name: Clone app-templates repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@${{ secrets.GITOPS_REPO_URL }} app-templates
          cd app-templates

      - name: Compute repo name
        run: |
          echo "REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV

      - name: Set paths
        run: |
          echo "VALUES_PATH=${{ needs.prepare.outputs.instance }}/${{ env.ORG }}/${REPO_NAME}/values.yaml" >> $GITHUB_ENV

      - name: Set image values
        run: |
          echo "IMAGE_REPO=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ needs.prepare.outputs.image_tag }}" >> $GITHUB_ENV

      - name: Install yq
        run: |
          sudo snap install yq

      - name: Update values.yaml
        run: |
          cd app-templates

          yq -i ".web.image.repository = env(IMAGE_REPO)" $VALUES_PATH
          yq -i ".web.image.tag = env(IMAGE_TAG)" $VALUES_PATH

      - name: Commit and push changes
        run: |
          cd app-templates

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "automatically initialized app in in predeploy stage of ci" || exit 0
          git push
